<svg width="100%" viewBox="0 0 720 1000" role="img" style="display:block;outline:none;border:none;background:#111111;" xmlns="http://www.w3.org/2000/svg">
<rect x="-2" y="-2" width="110%" height="110%" fill="#111111"/>
<title>WebSocket Message Flow</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
text { fill: #e0e0e0; font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.th { fill: #ffffff; }
.ts { fill: #b0b0b0; }
</style>

<text x="360" y="24" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">WebSocket message flow</text>

<!-- LEGEND -->
<rect x="30" y="40" width="12" height="12" rx="2" fill="#3d2400" stroke="#ef9f27" stroke-width="0.5"/>
<text x="48" y="50" font-size="12" fill="#c2c0b6">LLM involved</text>
<rect x="148" y="40" width="12" height="12" rx="2" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="166" y="50" font-size="12" fill="#c2c0b6">Sync / fast</text>
<rect x="246" y="40" width="12" height="12" rx="2" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="264" y="50" font-size="12" fill="#c2c0b6">Async task</text>

<!-- Browser → WS -->
<rect x="210" y="62" width="280" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="350" y="84" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Browser → WS:8765</text>
<line x1="350" y1="106" x2="350" y2="126" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Parse JSON -->
<rect x="230" y="126" width="240" height="44" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="350" y="148" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Parse JSON → message.type</text>
<line x1="350" y1="170" x2="350" y2="188" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Fast/sync box -->
<rect x="28" y="184" width="644" height="148" rx="8" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="40" y="198" font-size="11" fill="#888">Fast / sync handlers</text>

<rect x="40" y="204" width="148" height="52" rx="6" fill="#712b13" stroke="#f09983" stroke-width="0.5"/>
<text x="114" y="222" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#f5c4b3">:stop</text>
<text x="114" y="240" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#f09983">cancel task now</text>

<rect x="200" y="204" width="148" height="52" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="274" y="222" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">Session ops</text>
<text x="274" y="240" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5dcaa5">load · new · rename</text>

<rect x="360" y="204" width="148" height="52" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="434" y="222" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">Model switch</text>
<text x="434" y="240" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5dcaa5">reload agent</text>

<rect x="520" y="204" width="140" height="52" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="590" y="222" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">: commands</text>
<text x="590" y="240" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5dcaa5">handle_command()</text>

<rect x="40" y="266" width="148" height="52" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="114" y="284" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">List tools</text>
<text x="114" y="302" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5dcaa5">resolve + filter</text>

<rect x="200" y="266" width="148" height="52" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="274" y="284" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">Metrics / ping</text>
<text x="274" y="302" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5dcaa5">stats · pong</text>

<rect x="360" y="266" width="148" height="52" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="434" y="284" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">Sys monitor</text>
<text x="434" y="302" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5dcaa5">subscribe / stream</text>

<rect x="520" y="266" width="140" height="52" rx="6" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="590" y="284" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">Log stream</text>
<text x="590" y="302" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5dcaa5">WS:8766 tail</text>

<!-- Arrow from sync box to process_query -->
<text x="350" y="344" text-anchor="middle" font-size="11" fill="#888">user message</text>
<line x1="350" y1="350" x2="350" y2="368" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- process_query async task box -->
<rect x="60" y="364" width="572" height="370" rx="8" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="74" y="379" font-size="11" fill="#888">process_query() — asyncio background task</text>

<!-- History question? -->
<rect x="74" y="386" width="230" height="52" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="189" y="404" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">History question?</text>
<text x="189" y="422" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5dcaa5">Answer directly — no LLM</text>

<!-- Scheduling request? -->
<rect x="318" y="386" width="230" height="52" rx="8" fill="#3d2400" stroke="#ef9f27" stroke-width="0.5"/>
<text x="433" y="404" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#fac775">Scheduling request?</text>
<text x="433" y="422" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#ef9f27">ScheduleParser · confirm flow</text>
<!-- yes → exits right and loops back to broadcast -->
<path d="M548 412 L690 412 L690 930 L490 930" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)"/>
<text x="554" y="406" font-size="11" fill="#c2c0b6">yes →</text>

<!-- no → down to inject memory -->
<line x1="350" y1="438" x2="350" y2="458" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="362" y="451" font-size="11" fill="#c2c0b6">no</text>

<!-- Inject persistent memory -->
<rect x="175" y="458" width="350" height="44" rx="8" fill="#3c3489" stroke="#afade0" stroke-width="0.5"/>
<text x="350" y="480" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#cecbf6">Inject persistent memory</text>
<line x1="350" y1="502" x2="350" y2="522" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- run_agent_fn -->
<rect x="175" y="522" width="350" height="52" rx="8" fill="#3d2400" stroke="#ef9f27" stroke-width="0.5"/>
<text x="350" y="540" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">🤖  run_agent_fn()</text>
<text x="350" y="558" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">Full prompt loop (A2A / multi / single)</text>
<line x1="350" y1="574" x2="350" y2="594" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Scan ToolMessages -->
<rect x="175" y="594" width="350" height="44" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="350" y="616" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Scan ToolMessages for images</text>
<line x1="350" y1="638" x2="350" y2="658" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Persist + broadcast -->
<rect x="175" y="658" width="350" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="350" y="680" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Persist to SQLite · broadcast</text>
<line x1="350" y1="702" x2="350" y2="768" stroke="#9c9a92" stroke-width="0.8"/>

<!-- Three branches out -->
<line x1="130" y1="768" x2="570" y2="768" stroke="#9c9a92" stroke-width="0.8"/>
<line x1="130" y1="768" x2="130" y2="784" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="350" y1="768" x2="350" y2="784" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="570" y1="768" x2="570" y2="784" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- assistant_message -->
<rect x="40" y="784" width="180" height="52" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="130" y="803" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#b5d4f4">assistant_message</text>
<text x="130" y="820" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#85b7eb">text · image · model</text>

<!-- complete -->
<rect x="260" y="784" width="180" height="52" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="350" y="803" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#b5d4f4">complete</text>
<text x="350" y="820" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#85b7eb">stopped: true / false</text>

<!-- proactive result -->
<rect x="480" y="784" width="180" height="52" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="570" y="803" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#b5d4f4">proactive result</text>
<text x="570" y="820" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#85b7eb">scheduled job output</text>

<!-- Convergence to Browser UI updated -->
<line x1="130" y1="836" x2="130" y2="882" stroke="#9c9a92" stroke-width="0.8"/>
<line x1="350" y1="836" x2="350" y2="882" stroke="#9c9a92" stroke-width="0.8"/>
<line x1="570" y1="836" x2="570" y2="882" stroke="#9c9a92" stroke-width="0.8"/>
<line x1="130" y1="882" x2="570" y2="882" stroke="#9c9a92" stroke-width="0.8"/>
<line x1="350" y1="882" x2="350" y2="902" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="902" width="280" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="350" y="924" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Browser UI updated</text>

</svg>

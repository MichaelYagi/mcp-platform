  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
text { fill: #e0e0e0; font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.th { fill: #ffffff; }
.ts { fill: #b0b0b0; }
</style>

<text x="390" y="22" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">Memory and RAG context assembly</text>
<g transform="translate(0,30)">

<!-- LEGEND -->
<rect x="20" y="38" width="13" height="13" rx="3" fill="#3d2400" stroke="#ef9f27" stroke-width="0.5"/>
<text x="38" y="49" font-size="12" fill="#c2c0b6">LLM involved</text>
<rect x="148" y="38" width="13" height="13" rx="3" fill="#3c3489" stroke="#afade0" stroke-width="0.5"/>
<text x="166" y="49" font-size="12" fill="#c2c0b6">Memory tier</text>
<rect x="268" y="38" width="13" height="13" rx="3" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="286" y="49" font-size="12" fill="#c2c0b6">System / tools</text>

<!-- ═══════════════════════════════════════════ -->
<!-- PART A: MEMORY CONSOLIDATION               -->
<!-- ═══════════════════════════════════════════ -->

<!-- A1. Session messages -->
<rect x="190" y="58" width="400" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="390" y="73" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Session messages</text>
<text x="390" y="91" text-anchor="middle" dominant-baseline="central" font-size="12" class="ts">sessions.db · messages table</text>
<line x1="390" y1="102" x2="390" y2="120" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- A2. InactivityWatcher -->
<rect x="220" y="120" width="340" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="390" y="135" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">InactivityWatcher fires — 15 min idle</text>
<text x="390" y="153" text-anchor="middle" dominant-baseline="central" font-size="12" class="ts">consolidate() + consolidate_decisions()</text>
<line x1="390" y1="164" x2="390" y2="188" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- A3. LLM extraction -->
<rect x="110" y="188" width="560" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
<text x="390" y="208" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">LLM extracts facts + decisions</text>
<text x="390" y="227" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">_EXTRACT_PROMPT + _DECISION_PROMPT</text>

<!-- Split from A3 to left (facts) and right (decisions) -->
<path d="M 390 244 L 390 256 L 180 256 L 180 270" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)"/>
<path d="M 390 244 L 390 256 L 600 256 L 600 270" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)"/>
<text x="270" y="252" font-size="12" fill="#c2c0b6">facts</text>
<text x="420" y="252" font-size="12" fill="#c2c0b6">decisions</text>

<!-- A4a. Dedup + write episodic (left) -->
<rect x="30" y="270" width="300" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="180" y="290" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">Exact + cosine dedup (&gt;0.92)</text>
<text x="180" y="309" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">→ memory.db · tier = episodic</text>
<line x1="180" y1="326" x2="180" y2="344" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- A4b. Write decisions (right) -->
<rect x="450" y="270" width="300" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="600" y="290" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">Technical decisions extracted</text>
<text x="600" y="309" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">→ sessions.db · chunks table</text>
<line x1="600" y1="326" x2="600" y2="344" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- A5. Nightly promotion (left col) -->
<rect x="30" y="344" width="300" height="44" rx="8" fill="#3c3489" stroke="#afade0" stroke-width="0.5"/>
<text x="180" y="359" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#cecbf6">run_nightly_promotion()</text>
<text x="180" y="377" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#afade0">access_count ≥ 3 → episodic → semantic</text>
<line x1="180" y1="388" x2="180" y2="406" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- A7. sessions.db chunks store (right col, same y as A5) -->
<rect x="450" y="344" width="300" height="44" rx="8" fill="#042830" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="600" y="359" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#9fe1cb">sessions.db — chunks table</text>
<text x="600" y="377" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">RAG-searchable decisions</text>

<!-- A6. memory.db store (left col) -->
<rect x="30" y="406" width="300" height="44" rx="8" fill="#1a1248" stroke="#afade0" stroke-width="0.5"/>
<text x="180" y="421" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#cecbf6">memory.db — memories table</text>
<text x="180" y="439" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#afade0">episodic + semantic · bge-large embeddings</text>

<!-- ═══════════════════════════════════════════ -->
<!-- DIVIDER                                    -->
<!-- ═══════════════════════════════════════════ -->
<line x1="20" y1="468" x2="760" y2="468" stroke="#444444" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="390" y="483" text-anchor="middle" font-size="13" fill="#888888">Per-query context assembly</text>

<!-- ═══════════════════════════════════════════ -->
<!-- PART B: CONTEXT ASSEMBLY                   -->
<!-- ═══════════════════════════════════════════ -->

<!-- B1. User query -->
<rect x="230" y="496" width="320" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="390" y="518" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">User query arrives</text>
<line x1="390" y1="540" x2="390" y2="558" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- B2. inject_into_system_prompt -->
<rect x="155" y="558" width="470" height="56" rx="8" fill="#3c3489" stroke="#afade0" stroke-width="0.5"/>
<text x="390" y="578" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#cecbf6">inject_into_system_prompt(query)</text>
<text x="390" y="597" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#afade0">cosine similarity → memory.db · top-N by importance</text>
<line x1="390" y1="614" x2="390" y2="632" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- B3. Context block group -->
<rect x="20" y="632" width="740" height="244" rx="8" fill="none" stroke="#444444" stroke-width="0.5" stroke-dasharray="5 3"/>

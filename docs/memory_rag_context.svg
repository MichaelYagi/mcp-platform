<!-- B3a. System prompt + top-5 memories -->
<rect x="40" y="658" width="542" height="36" rx="6" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="311" y="676" text-anchor="middle" dominant-baseline="central" font-size="13" class="th">1  System prompt + top-5 high-importance memories</text>
<text x="590" y="676" font-size="10" fill="#888888">memory.db (importance DESC)</text>

<!-- B3b. Query-relevant memories -->
<rect x="40" y="700" width="542" height="36" rx="6" fill="#3c3489" stroke="#afade0" stroke-width="0.5"/>
<text x="311" y="718" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#cecbf6">2  Query-relevant memories (vector similarity)</text>
<text x="590" y="718" font-size="10" fill="#888888">memory.db (cosine search)</text>

<!-- B3c. Conversation RAG -->
<rect x="40" y="742" width="542" height="36" rx="6" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="311" y="760" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#b5d4f4">3  Conversation RAG (scrolled-out turns)</text>
<text x="590" y="760" font-size="10" fill="#888888">sessions.db chunks</text>

<!-- B3d. Recent window turns -->

<text x="311" y="802" text-anchor="middle" dominant-baseline="central" font-size="12" class="th">4  Last LLM_MESSAGE_WINDOW turns (direct history)</text>
<text x="590" y="802" font-size="10" fill="#888888">session state (in-memory)</text>

<!-- B3e. Current user message -->

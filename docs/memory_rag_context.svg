<rect x="155" y="898" width="470" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
<text x="390" y="918" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">LLM inference — run_agent()</text>
<text x="390" y="937" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">Assembled context → qwen2.5:14b via Ollama</text>


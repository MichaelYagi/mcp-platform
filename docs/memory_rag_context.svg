<svg width="100%" viewBox="0 0 780 1000" role="img" style="display:block;outline:none;border:none;background:#111111;" xmlns="http://www.w3.org/2000/svg">
<rect x="-2" y="-2" width="110%" height="110%" fill="#111111"/>
<title>Memory and RAG Context Assembly</title>

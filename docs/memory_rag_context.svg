<text x="311" y="844" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#9fe1cb">5  Current user message</text>
<text x="590" y="844" font-size="10" fill="#888888">user input</text>

<line x1="390" y1="876" x2="390" y2="898" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>


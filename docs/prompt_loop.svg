<svg width="100%" viewBox="0 0 685 1160" role="img" style="display:block;outline:none;border:none;background:#111111;" xmlns="http://www.w3.org/2000/svg">
<rect x="-2" y="-2" width="110%" height="110%" fill="#111111"/>
<title>MCP Platform Prompt Loop</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <!-- Mask: cuts white holes where branch-line labels sit so vertical spines don't overdraw them -->
  <mask id="right-spine-mask" maskUnits="userSpaceOnUse">
    <rect x="0" y="0" width="685" height="1130" fill="white"/>
    <!-- :stop yes label -->
    <rect x="497" y="274" width="90" height="18" rx="2" fill="black"/>
    <!-- :command yes label -->
    <rect x="497" y="342" width="90" height="18" rx="2" fill="black"/>
    <!-- scheduling yes label -->
    <rect x="497" y="410" width="100" height="18" rx="2" fill="black"/>
    <!-- loop label on right spine -->
    <rect x="640" y="598" width="38" height="18" rx="2" fill="black"/>
  </mask>
  <mask id="left-branch-mask" maskUnits="userSpaceOnUse">
    <rect x="0" y="0" width="685" height="1130" fill="white"/>
  </mask>
</defs>
<style>
text { fill: #e0e0e0; font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.th { fill: #ffffff; }
.ts { fill: #b0b0b0; }
</style>

<text x="342" y="22" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">MCP platform prompt loop</text>
<g transform="translate(0,30)">

<!-- LEGEND -->
<rect x="400" y="18" width="13" height="13" rx="3" fill="#3d2400" stroke="#ef9f27" stroke-width="0.5"/>
<text x="419" y="29" font-size="12" fill="#c2c0b6">LLM involved</text>
<rect x="508" y="18" width="13" height="13" rx="3" fill="#0a5c47" stroke="#1d9e75" stroke-width="0.5"/>
<text x="527" y="29" font-size="12" fill="#c2c0b6">System / tools</text>

<!-- 1. Startup -->
<rect x="231" y="48" width="220" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="341" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Startup: main()</text>
<line x1="341" y1="92" x2="341" y2="116" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 2. Initialise platform -->
<rect x="161" y="116" width="360" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="341" y="136" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Initialise platform</text>
<text x="341" y="155" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">MCP servers · LLM · tools · memory · A2A · scheduler</text>
<line x1="341" y1="172" x2="341" y2="196" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 3. Prompt loop -->
<rect x="201" y="196" width="280" height="44" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="341" y="218" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#b5d4f4">Prompt loop  (CLI / WebSocket)</text>
<line x1="341" y1="240" x2="341" y2="264" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 4. :stop command? -->
<rect x="259" y="264" width="164" height="44" rx="8" fill="#712b13" stroke="#f09983" stroke-width="0.5"/>
<text x="341" y="286" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#f5c4b3">:stop command?</text>
<!-- no arrow down -->
<line x1="341" y1="308" x2="341" y2="332" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="353" y="323" font-size="12" fill="#c2c0b6">no</text>
<!-- yes → right spine back to prompt loop -->
<path d="M423 286 L590 286 L590 218 L481 218" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)" mask="url(#right-spine-mask)"/>
<text x="498" y="279" font-size="12" fill="#c2c0b6">yes → cancel &amp; loop</text>

<!-- 5. : command? -->
<rect x="259" y="332" width="164" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="341" y="354" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">: command?</text>
<!-- no arrow down -->
<line x1="341" y1="376" x2="341" y2="400" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="353" y="391" font-size="12" fill="#c2c0b6">no</text>
<!-- yes → right spine back to prompt loop -->
<path d="M423 354 L590 354 L590 218 L481 218" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)" mask="url(#right-spine-mask)"/>
<text x="498" y="347" font-size="12" fill="#c2c0b6">yes → handle &amp; loop</text>

<!-- 6. Scheduling request? [NEW] -->
<rect x="241" y="400" width="200" height="44" rx="8" fill="#3d2400" stroke="#ef9f27" stroke-width="0.5"/>
<text x="341" y="415" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">🤖  Scheduling request?</text>
<text x="341" y="434" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">looks_like_scheduling_request()</text>
<!-- no arrow down -->
<line x1="341" y1="444" x2="341" y2="468" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="353" y="459" font-size="12" fill="#c2c0b6">no</text>
<!-- yes → right spine back to prompt loop (via ScheduleParser) -->
<path d="M441 422 L590 422 L590 218 L481 218" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)" mask="url(#right-spine-mask)"/>
<text x="498" y="415" font-size="12" fill="#c2c0b6">yes → ScheduleParser · confirm · loop</text>

<!-- 7. "use tool_name …"? -->
<rect x="219" y="468" width="244" height="56" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="341" y="488" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">"use tool_name …"?</text>
<text x="341" y="507" text-anchor="middle" dominant-baseline="central" font-size="12" class="ts">Direct dispatch — bypasses LLM</text>
<!-- no arrow down -->
<line x1="341" y1="524" x2="341" y2="548" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="353" y="539" font-size="12" fill="#c2c0b6">no</text>
<!-- yes → left spine to LLM tool call box -->
<path d="M219 496 L12 496 L12 868 L202 868" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)" mask="url(#left-branch-mask)"/>
<text x="20" y="488" font-size="12" fill="#c2c0b6">yes → direct call</text>

<!-- 8. Inject skills + memory -->
<rect x="219" y="548" width="244" height="44" rx="8" fill="#3c3489" stroke="#afade0" stroke-width="0.5"/>
<text x="341" y="570" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#cecbf6">Inject skills + memory</text>
<line x1="341" y1="592" x2="341" y2="616" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 9. Route execution -->
<rect x="201" y="616" width="280" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
<text x="341" y="636" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">🤖  Route execution</text>
<text x="341" y="655" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">LLM classifies: A2A · multi-agent · single?</text>

<!-- Three branch lines from Route execution -->
<line x1="201" y1="644" x2="102" y2="644" stroke="#9c9a92" stroke-width="0.8"/>
<line x1="102" y1="644" x2="102" y2="704" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="102" y="680" text-anchor="middle" font-size="12" fill="#c2c0b6">A2A</text>
<line x1="341" y1="672" x2="341" y2="704" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="341" y="688" text-anchor="middle" font-size="12" fill="#c2c0b6">multi-agent</text>
<line x1="481" y1="644" x2="560" y2="644" stroke="#9c9a92" stroke-width="0.8"/>
<line x1="560" y1="644" x2="560" y2="704" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="560" y="680" text-anchor="middle" font-size="12" fill="#c2c0b6">single</text>

<!-- 9a. A2A orchestrator -->
<rect x="30" y="704" width="144" height="56" rx="8" fill="#712b13" stroke="#f09983" stroke-width="0.5"/>
<text x="102" y="724" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#f5c4b3">A2A orchestrator</text>
<text x="102" y="742" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#f09983">Remote agent call</text>

<!-- 9b. Multi-agent -->
<rect x="249" y="704" width="184" height="56" rx="8" fill="#3c3489" stroke="#afade0" stroke-width="0.5"/>
<text x="341" y="724" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#cecbf6">Multi-agent</text>
<text x="341" y="742" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#afa9ec">Orchestrator.execute()</text>

<!-- 9c. Single agent -->
<rect x="488" y="704" width="144" height="56" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="560" y="724" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#b5d4f4">Single agent</text>
<text x="560" y="742" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#85b7eb">LangGraph loop</text>

<!-- Converge three branches into LLM tool call -->
<line x1="102" y1="760" x2="102" y2="844" stroke="#9c9a92" stroke-width="0.8"/>
<path d="M102 844 L202 844" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="341" y1="760" x2="341" y2="844" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="560" y1="760" x2="560" y2="844" stroke="#9c9a92" stroke-width="0.8"/>
<path d="M560 844 L480 844" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- 10. LLM decides → tool call(s) -->
<rect x="202" y="844" width="278" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
<text x="341" y="864" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">🤖  LLM decides → tool call(s)</text>
<text x="341" y="883" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">MCP session.call_tool()</text>
<line x1="341" y1="900" x2="341" y2="924" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 11. Tool result returned -->
<rect x="202" y="924" width="278" height="44" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="341" y="946" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Tool result returned</text>
<line x1="341" y1="968" x2="341" y2="992" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 12. Format response -->
<rect x="202" y="992" width="278" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
<text x="341" y="1012" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">🤖  Format response</text>
<text x="341" y="1031" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">LLM summarises if needed → text</text>
<line x1="341" y1="1048" x2="341" y2="1072" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 13. Broadcast -->
<rect x="202" y="1072" width="278" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="341" y="1094" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Broadcast: CLI · WebSocket · log</text>

<!-- Loop back — right spine from Broadcast back to Prompt loop -->
<path d="M480 1094 L638 1094 L638 218 L481 218" fill="none" stroke="#9c9a92" stroke-width="0.8" marker-end="url(#arrow)" mask="url(#right-spine-mask)"/>
<text x="642" y="660" text-anchor="start" font-size="12" fill="#c2c0b6">↺ loop</text>

</g>
</svg>

<svg width="100%" viewBox="0 0 680 970" role="img" style="display:block;outline:none;border:none;background:#111111;" xmlns="http://www.w3.org/2000/svg">
<rect x="-2" y="-2" width="110%" height="110%" fill="#111111"/>
<title>MCP Platform Startup &amp; Initialisation Sequence</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
text { fill: #e0e0e0; font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.th { fill: #ffffff; }
.ts { fill: #b0b0b0; }
</style>
<text x="340" y="22" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">Startup &amp; initialisation sequence</text>
<g transform="translate(0,30)">

<!-- LEGEND -->
<rect x="30" y="18" width="13" height="13" rx="3" fill="#3d2400" stroke="#ef9f27" stroke-width="0.5"/>
<text x="49" y="29" font-size="12" fill="#c2c0b6">LLM involved</text>
<rect x="150" y="18" width="13" height="13" rx="3" fill="#0a5c47" stroke="#1d9e75" stroke-width="0.5"/>
<text x="169" y="29" font-size="12" fill="#c2c0b6">System / tools</text>
<rect x="268" y="18" width="13" height="13" rx="3" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="287" y="29" font-size="12" fill="#c2c0b6">Sequential step</text>

<!-- 1. Setup logging -->
<rect x="200" y="48" width="280" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="340" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Setup logging + event loop</text>
<line x1="340" y1="92" x2="340" y2="116" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 2. Auto-discover MCP servers -->
<rect x="200" y="116" width="280" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="340" y="136" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Auto-discover MCP servers</text>
<text x="340" y="155" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">TCP checks · OAuth probes (parallel)</text>
<line x1="340" y1="172" x2="340" y2="196" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 3. Load LLM -->
<rect x="200" y="196" width="280" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
<text x="340" y="216" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">🤖  Load LLM</text>
<text x="340" y="235" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">Ollama or GGUF · select model</text>
<line x1="340" y1="252" x2="340" y2="276" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 4. MCPAgent init -->
<rect x="200" y="276" width="280" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="340" y="296" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">MCPAgent.initialize()</text>
<text x="340" y="315" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">Connect sessions · collect tools</text>
<line x1="340" y1="332" x2="340" y2="356" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 5. OAuth filter -->
<rect x="200" y="356" width="280" height="56" rx="8" fill="#712b13" stroke="#f09983" stroke-width="0.5"/>
<text x="340" y="376" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#f5c4b3">Filter OAuth-blocked tools</text>
<text x="340" y="395" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#f09983">Remove tools from servers needing sign-in</text>
<line x1="340" y1="412" x2="340" y2="436" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 6. Memory + session init -->
<rect x="200" y="436" width="280" height="56" rx="8" fill="#3c3489" stroke="#afade0" stroke-width="0.5"/>
<text x="340" y="456" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#cecbf6">Memory + session init</text>
<text x="340" y="475" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#afa9ec">InactivityWatcher · SessionManager · nightly loop</text>
<line x1="340" y1="492" x2="340" y2="516" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 7. Proactive scheduler -->
<rect x="200" y="516" width="280" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="340" y="536" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Proactive scheduler start</text>
<text x="340" y="555" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">AgentScheduler · ScheduleParser</text>
<line x1="340" y1="572" x2="340" y2="596" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 8. Distributed skills discovery -->
<rect x="200" y="596" width="280" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="340" y="616" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Distributed skills discovery</text>
<text x="340" y="635" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">DistributedSkillsManager · inject into prompt</text>
<line x1="340" y1="652" x2="340" y2="676" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 9. A2A endpoint registration -->
<rect x="200" y="676" width="280" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="340" y="696" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">A2A endpoint registration</text>
<text x="340" y="715" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">All endpoints discovered in parallel</text>
<!-- parallel callout -->
<rect x="496" y="682" width="152" height="44" rx="6" fill="none" stroke="#9c9a92" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="572" y="700" text-anchor="middle" font-size="12" fill="#c2c0b6">asyncio.gather()</text>
<text x="572" y="716" text-anchor="middle" font-size="12" fill="#c2c0b6">concurrent discovery</text>
<line x1="480" y1="704" x2="496" y2="704" stroke="#9c9a92" stroke-width="0.5" stroke-dasharray="3 2"/>
<!-- Plex ML background task side note -->
<line x1="200" y1="704" x2="34" y2="704" stroke="#9c9a92" stroke-width="0.5" stroke-dasharray="3 2"/>
<rect x="10" y="682" width="168" height="44" rx="6" fill="none" stroke="#5f5e5a" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="94" y="700" text-anchor="middle" font-size="12" fill="#b4b2a9">Plex ML: import history</text>
<text x="94" y="716" text-anchor="middle" font-size="12" fill="#b4b2a9">&amp; train (background task)</text>
<line x1="340" y1="732" x2="340" y2="756" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 10. Build agent + orchestrator -->
<rect x="200" y="756" width="280" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
<text x="340" y="776" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">🤖  Build agent + orchestrator</text>
<text x="340" y="795" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">LangGraph agent · MultiAgentOrchestrator</text>
<line x1="340" y1="812" x2="340" y2="836" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- 11. Prompt loop starts -->
<rect x="200" y="836" width="280" height="44" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="340" y="858" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#b5d4f4">▶  Prompt loop starts</text>

</g>
</svg>

<svg width="100%" viewBox="0 0 760 860" role="img" style="display:block;outline:none;border:none;background:#111111;" xmlns="http://www.w3.org/2000/svg">
<rect x="-2" y="-2" width="110%" height="110%" fill="#111111"/>
<title>MCP Tool Result Processing Pipeline</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <mask id="spine-mask" maskUnits="userSpaceOnUse">
    <rect x="0" y="0" width="760" height="830" fill="white"/>
    <!-- yes labels on the branch lines -->
    <rect x="126" y="127" width="22" height="16" rx="2" fill="black"/>
    <rect x="156" y="195" width="22" height="16" rx="2" fill="black"/>
    <rect x="488" y="263" width="22" height="16" rx="2" fill="black"/>
    <rect x="488" y="331" width="22" height="16" rx="2" fill="black"/>
  </mask>
</defs>
<style>
text { fill: #e0e0e0; font-family: 'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.th { fill: #ffffff; }
.ts { fill: #b0b0b0; }
</style>
<text x="340" y="22" text-anchor="middle" font-size="16" font-weight="500" fill="#ffffff">Tool result processing pipeline</text>
<g transform="translate(0,30)">

<!-- LEGEND -->
<rect x="30" y="14" width="12" height="12" rx="2" fill="#3d2400" stroke="#ef9f27" stroke-width="0.5"/>
<text x="48" y="24" font-size="12" fill="#c2c0b6">LLM involved</text>
<rect x="148" y="14" width="12" height="12" rx="2" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="166" y="24" font-size="12" fill="#c2c0b6">System (no LLM)</text>

<!-- Entry -->
<rect x="215" y="44" width="250" height="44" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="340" y="66" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Tool result returned</text>
<line x1="340" y1="88" x2="340" y2="112" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- D1: Plain text? -->
<rect x="215" y="112" width="250" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="340" y="134" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Plain text?  (not JSON)</text>
<!-- no → down -->
<line x1="340" y1="156" x2="340" y2="180" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="171" font-size="12" fill="#c2c0b6">no</text>
<!-- yes → left spine -->
<line x1="215" y1="134" x2="70" y2="134" stroke="#9c9a92" stroke-width="0.8" mask="url(#spine-mask)"/>
<line x1="70" y1="134" x2="70" y2="750" stroke="#9c9a92" stroke-width="0.8" mask="url(#spine-mask)"/>
<text x="128" y="127" font-size="12" fill="#c2c0b6">yes</text>

<!-- D2: Has image_source / base64? -->
<rect x="195" y="180" width="290" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="340" y="202" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Has image_source / base64?</text>
<!-- no → down -->
<line x1="340" y1="224" x2="340" y2="248" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="239" font-size="12" fill="#c2c0b6">no</text>
<!-- yes → left spine (slightly right of plain-text branch) -->
<line x1="195" y1="202" x2="150" y2="202" stroke="#9c9a92" stroke-width="0.8" mask="url(#spine-mask)"/>
<line x1="150" y1="202" x2="150" y2="750" stroke="#9c9a92" stroke-width="0.8" mask="url(#spine-mask)"/>
<text x="158" y="195" font-size="12" fill="#c2c0b6">yes</text>

<!-- D3: Has "text" key (string)? -->
<rect x="195" y="248" width="290" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="340" y="270" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Has "text" key (string)?</text>
<!-- no → down -->
<line x1="340" y1="292" x2="340" y2="316" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="307" font-size="12" fill="#c2c0b6">no</text>
<!-- yes → right spine -->
<line x1="485" y1="270" x2="530" y2="270" stroke="#9c9a92" stroke-width="0.8" mask="url(#spine-mask)"/>
<line x1="530" y1="270" x2="530" y2="750" stroke="#9c9a92" stroke-width="0.8" mask="url(#spine-mask)"/>
<text x="490" y="263" font-size="12" fill="#c2c0b6">yes</text>

<!-- D4: Has "summary" key (no lists)? -->
<rect x="195" y="316" width="290" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="340" y="338" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Has "summary" key (no lists)?</text>
<!-- no → down -->
<line x1="340" y1="360" x2="340" y2="384" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="375" font-size="12" fill="#c2c0b6">no</text>
<!-- yes → right spine (slightly right of text-key branch) -->
<line x1="485" y1="338" x2="610" y2="338" stroke="#9c9a92" stroke-width="0.8" mask="url(#spine-mask)"/>
<line x1="610" y1="338" x2="610" y2="750" stroke="#9c9a92" stroke-width="0.8" mask="url(#spine-mask)"/>
<text x="490" y="331" font-size="12" fill="#c2c0b6">yes</text>

<!-- D5: Contains array of items? -->
<rect x="210" y="384" width="260" height="44" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="340" y="406" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" class="th">Contains array of items?</text>
<!-- yes → down to list builder -->
<line x1="340" y1="428" x2="340" y2="452" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="443" font-size="12" fill="#c2c0b6">yes</text>
<!-- no → far-right spine (LLM fallback) -->
<line x1="470" y1="406" x2="700" y2="406" stroke="#9c9a92" stroke-width="0.8"/>
<line x1="700" y1="406" x2="700" y2="750" stroke="#9c9a92" stroke-width="0.8"/>
<text x="476" y="399" font-size="12" fill="#c2c0b6">no</text>

<!-- List builder outcome -->
<rect x="210" y="452" width="260" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="340" y="472" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">List builder</text>
<text x="340" y="491" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">title · score · snippet per item</text>
<line x1="340" y1="508" x2="340" y2="750" stroke="#9c9a92" stroke-width="0.8"/>

<!-- Outcome labels row at y=570 -->

<!-- Branch 1: Pass through (x=70) -->
<rect x="30" y="570" width="80" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="70" y="590" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Pass</text>
<text x="70" y="609" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">through</text>
<line x1="70" y1="626" x2="70" y2="750" stroke="#9c9a92" stroke-width="0.8"/>

<!-- Branch 2: Vision (x=150) -->
<rect x="110" y="570" width="80" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
<text x="150" y="586" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">🤖 Vision</text>
<text x="150" y="604" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">Ollama</text>
<text x="150" y="618" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">vision model</text>
<line x1="150" y1="626" x2="150" y2="750" stroke="#9c9a92" stroke-width="0.8"/>

<!-- Branch 3: Use text field (x=530) -->
<rect x="490" y="570" width="80" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="530" y="590" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Use</text>
<text x="530" y="609" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">text field</text>
<line x1="530" y1="626" x2="530" y2="750" stroke="#9c9a92" stroke-width="0.8"/>

<!-- Branch 4: Use summary (x=610) -->
<rect x="570" y="570" width="80" height="56" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="610" y="590" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9fe1cb">Use</text>
<text x="610" y="609" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5dcaa5">summary</text>
<line x1="610" y1="626" x2="610" y2="750" stroke="#9c9a92" stroke-width="0.8"/>

<!-- Branch 5: LLM fallback (x=700) -->
<rect x="660" y="570" width="80" height="56" rx="8" fill="#633806" stroke="#ef9f27" stroke-width="0.5"/>
<text x="700" y="586" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#fac775">🤖 LLM</text>
<text x="700" y="604" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">summarise</text>
<text x="700" y="618" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#ef9f27">fallback</text>
<line x1="700" y1="626" x2="700" y2="750" stroke="#9c9a92" stroke-width="0.8"/>

<!-- Convergence -->
<line x1="70" y1="750" x2="700" y2="750" stroke="#9c9a92" stroke-width="0.8"/>
<line x1="340" y1="750" x2="340" y2="774" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Output -->
<rect x="190" y="774" width="300" height="44" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="340" y="796" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#b5d4f4">Formatted response text</text>

</g>
</svg>

[pytest]
# Pytest configuration for MCP A2A test suite

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# Minimum version
minversion = 7.4

# Test paths
testpaths = tests

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Show which tests are slowest
    --durations=10
    # Strict markers
    --strict-markers
    # Warnings
    -W error::DeprecationWarning
    -W error::PendingDeprecationWarning
    # JUnit XML report
    --junit-xml=tests/results/junit.xml
    # Coverage — comment these three lines out to run without coverage (e.g. from PyCharm)
    --cov=client
    --cov-report=xml:tests/results/coverage.xml
    --cov-report=term-missing

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (multiple components)
    e2e: End-to-end tests (full system)
    slow: Tests that take >1 second
    requires_ollama: Tests that need Ollama running
    requires_db: Tests that need database
    websocket: WebSocket-related tests
    mcp_server: MCP server tests
    llm: Tests involving LLM calls (mocked)

# Asyncio mode
asyncio_mode = auto

# Timeout for tests (prevent hanging)
timeout = 300